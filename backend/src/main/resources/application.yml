spring:
  application:
    name: sse-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sse_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 25MB
      max-request-size: 130MB
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:true}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  health:
    mail:
      enabled: ${SSE_MAIL_ENABLED:false}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:sse-super-secret-key-change-in-production-min-32-chars}
  access-token-expiration: 900000    # 15 minutes
  refresh-token-expiration: 604800000 # 7 days

sse:
  demo-data:
    enabled: ${SSE_DEMO_DATA_ENABLED:false}
    password: ${SSE_DEMO_DATA_PASSWORD:password}
  mail:
    enabled: ${SSE_MAIL_ENABLED:false}
    from: ${SSE_MAIL_FROM:no-reply@sse.local}
    app-url: ${SSE_MAIL_APP_URL:http://localhost:3000}
    activation-token-ttl-hours: ${SSE_MAIL_ACTIVATION_TOKEN_TTL_HOURS:48}
    job-max-attempts: ${SSE_MAIL_JOB_MAX_ATTEMPTS:5}
    job-retry-delay-minutes: ${SSE_MAIL_JOB_RETRY_DELAY_MINUTES:15}
    job-batch-size: ${SSE_MAIL_JOB_BATCH_SIZE:20}
    jobs:
      initial-delay-ms: ${SSE_MAIL_JOBS_INITIAL_DELAY_MS:10000}
      fixed-delay-ms: ${SSE_MAIL_JOBS_FIXED_DELAY_MS:60000}

  aws:
    region: ${AWS_REGION:eu-central-1}
    s3:
      bucket: ${AWS_S3_BUCKET:sse-uploads-bucket}
  translation:
    enabled: ${SSE_TRANSLATION_ENABLED:true}
    api-url: ${SSE_TRANSLATION_API_URL:https://api.mymemory.translated.net}
    contact-email: ${SSE_TRANSLATION_CONTACT_EMAIL:}

# File Upload
upload:
  dir: uploads
  max-file-size: 26214400  # 25MB

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:3000,http://localhost:5173}

# Logging
logging:
  level:
    com.sse: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/sse_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 130MB

server:
  port: ${PORT:8080}

logging:
  level:
    com.sse: INFO
    org.springframework.security: WARN
