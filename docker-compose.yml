services:
  postgres:
    image: postgres:15-alpine
    container_name: sse-postgres
    environment:
      POSTGRES_DB: sse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sse-backend
    ports:
      - "8088:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sse_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-sse-super-secret-key-change-in-production-min-32-chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
      SSE_DEMO_DATA_ENABLED: ${SSE_DEMO_DATA_ENABLED:-true}
      SSE_DEMO_DATA_PASSWORD: ${SSE_DEMO_DATA_PASSWORD:-password}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS_ENABLE: ${SMTP_STARTTLS_ENABLE:-true}
      SSE_MAIL_ENABLED: ${SSE_MAIL_ENABLED:-false}
      SSE_MAIL_FROM: ${SSE_MAIL_FROM:-no-reply@sse.local}
      SSE_MAIL_APP_URL: ${SSE_MAIL_APP_URL:-http://localhost:3000}
      SSE_TRANSLATION_ENABLED: ${SSE_TRANSLATION_ENABLED:-true}
      SSE_TRANSLATION_API_URL: ${SSE_TRANSLATION_API_URL:-https://api.mymemory.translated.net}
      SSE_TRANSLATION_CONTACT_EMAIL: ${SSE_TRANSLATION_CONTACT_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sse-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
